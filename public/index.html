            return `
                <div class="bg-white border border-[#e5d9cf] rounded-3xl overflow-hidden shadow-sm">
                    <button type="button" onclick="toggleExpansion(this)" class="w-full flex items-center justify-between gap-4 p-6 lg:p-8 text-left hover:bg-[#fcfaf7] transition-all min-h-[var(--touch-min)]" aria-expanded="false">
                        <span class="flex items-center gap-3 text-xl font-black text-[#7d6b5d] uppercase tracking-wide">
                            <i class="fa-solid ${iconClass} text-2xl text-[#7d6b5d]/80" aria-hidden="true"></i>
                            ${label}
                        </span>
                        <i class="expand-icon fa-solid fa-chevron-down text-[#8c837a] text-xl" aria-hidden="true"></i>
                    </button>
                    <div class="expansion-content">
                        <div class="p-6 lg:p-8 pt-4 border-t border-[#f0ede6] bg-[#fdfdfb]">
                            <div class="text-lg lg:text-xl italic text-[#4a443f] leading-relaxed font-serif">
                                ${htmlContent}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        let activeId = 'm1-intro';
        const JOURNAL_STORAGE_KEY = 'prayer-counseling-workbook-journal';
        let journalData = {};
        let journalSaveTimeout = null;

        function getDeviceId() {
            try {
                let id = localStorage.getItem('prayer-counseling-device-id');
                if (!id) {
                    id = 'device-' + Math.random().toString(36).slice(2) + '-' + Date.now();
                    localStorage.setItem('prayer-counseling-device-id', id);
                }
                return id;
            } catch (e) { return 'default'; }
        }

        function loadJournalFromStorage() {
            try {
                const raw = localStorage.getItem(JOURNAL_STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    return typeof parsed === 'object' && parsed !== null ? parsed : {};
                }
            } catch (e) { /* ignore */ }
            return {};
        }

        function persistJournal() {
            try {
                localStorage.setItem(JOURNAL_STORAGE_KEY, JSON.stringify(journalData));
            } catch (e) { /* ignore */ }
        }

        function init() {
            journalData = loadJournalFromStorage();
            renderNav();
            renderContent();
        }

        function renderNav() {
            const menu = document.getElementById('nav-menu');
            let currentMod = 0;
            let html = '';
            const modNames = {
                2: "Repentance and Restitution",
                5: "Bitter Roots",
                6: "Heart of Stone"
            };
            const navIcons = {
                'm1-intro': 'fa-hand-holding-heart',
                'm1-ingredients': 'fa-list-check',
                'm1-laws': 'fa-scale-balanced',
                'm1-smallgroups': 'fa-people-group',
                'm2-rep': 'fa-cross',
                'm3-def': 'fa-dove',
                'm3-prayer': 'fa-hands-praying',
                'm4-roles': 'fa-people-arrows',
                'm5-def': 'fa-seedling',
                'm5-check': 'fa-clipboard-check',
                'm6-stone': 'fa-heart-pulse',
                'm6-healing': 'fa-hand-holding-medical',
                'm7-found': 'fa-layer-group',
                'm8-wrap': 'fa-lightbulb'
            };
            SECTIONS.forEach(s => {
                if(s.mod !== currentMod) {
                    currentMod = s.mod;
                    const modLabel = modNames[currentMod] ? `Module ${currentMod}: ${modNames[currentMod]}` : `Module ${currentMod}`;
                    html += `<h3 class="sidebar-module-label">${modLabel}</h3>`;
                }
                const icon = navIcons[s.id] || 'fa-circle-dot';
                html += `<button type="button" id="nav-${s.id}" onclick="navigate('${s.id}')" class="nav-btn w-full text-left mb-1" aria-current="false"><span class="nav-btn-icon"><i class="fa-solid ${icon}" aria-hidden="true"></i></span><span class="flex-1 truncate">${s.title}</span></button>`;
            });
            menu.innerHTML = html;
        }

        function renderContent() {
            const section = SECTIONS.find(s => s.id === activeId);
            const area = document.getElementById('content-area');
            if (!section) return;

            area.innerHTML = `
                <div class="animate-in fade-in slide-in-from-bottom-2 duration-500">
                    ${section.content}
                    <div class="note-box mt-16 p-8 journal-box shadow-sm">
                        <h3 class="font-serif font-black text-[#7d6b5d] text-2xl mb-2 uppercase flex items-center gap-4"><i class="fa-solid fa-pen-nib" aria-hidden="true"></i> Journal Entry</h3>
                        <p class="text-sm text-[#5c5650] mb-4">Saved automatically on this device. Use the download button to export the full workbook with all sections and your notes.</p>
                        <label for="note-${activeId}" class="sr-only">Your reflections for this section</label>
                        <textarea id="note-${activeId}" oninput="saveNote('${activeId}', this.value)" class="w-full min-h-[12rem] bg-transparent border-2 border-[#e5d9cf] rounded-xl focus:outline-none focus:border-[#7d6b5d] focus:ring-2 focus:ring-[#7d6b5d]/20 p-4 text-lg" placeholder="Enter your personal reflections here..." aria-label="Journal entry for this section">${journalData[activeId] || ''}</textarea>
                        <p class="mt-3 text-sm"><button type="button" onclick="downloadWorkbook(true)" class="text-[#7d6b5d] font-bold underline hover:no-underline">Download journal only</button> · <button type="button" onclick="downloadWorkbook(false)" class="text-[#7d6b5d] font-bold underline hover:no-underline">Download full workbook</button></p>
                    </div>
                </div>
            `;
            updateNavUI();
        }

        function navigate(id) {
            activeId = id;
            renderContent();
            if(window.innerWidth < 1024) toggleSidebar();
            window.scrollTo(0,0);
        }

        function navigateNext() {
            const idx = SECTIONS.findIndex(s => s.id === activeId);
            if(idx < SECTIONS.length -1) navigate(SECTIONS[idx+1].id);
        }

        function navigatePrev() {
            const idx = SECTIONS.findIndex(s => s.id === activeId);
            if(idx > 0) navigate(SECTIONS[idx-1].id);
        }

        function updateNavUI() {
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active');
                b.removeAttribute('aria-current');
            });
            const activeBtn = document.getElementById(`nav-${activeId}`);
            if (activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.setAttribute('aria-current', 'true');
                activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth', inline: 'nearest' });
            }

            const idx = SECTIONS.findIndex(s => s.id === activeId);
            document.getElementById('prev-btn').disabled = idx === 0;
            document.getElementById('next-btn').disabled = idx === SECTIONS.length - 1;
            document.getElementById('page-indicator').innerText = `Step ${idx + 1} of ${SECTIONS.length}`;
        }

        function toggleExpansion(btn) {
            const content = btn.nextElementSibling;
            const icon = btn.querySelector('.expand-icon, i.fa-chevron-down, i.fa-chevron-up');
            if (content) {
                content.classList.toggle('open');
                btn.setAttribute('aria-expanded', content.classList.contains('open'));
            }
            if (icon) {
                if (icon.classList.contains('fa-chevron-down')) icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
                else if (icon.classList.contains('fa-chevron-up')) icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        }

        function toggleSidebar() {
            const bar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            bar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function saveNote(id, val) {
            journalData[id] = val;
            if (journalSaveTimeout) clearTimeout(journalSaveTimeout);
            journalSaveTimeout = setTimeout(persistJournal, 500);
        }

        function stripHtmlToText(html) {
            if (!html) return '';
            const div = document.createElement('div');
            div.innerHTML = html;
            return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
        }

        function downloadWorkbook(journalOnly) {
            const lines = [];
            lines.push('PRAYER COUNSELING SEMINAR I — FULL INTEGRATED WORKBOOK');
            lines.push('Bukas-Loob sa Diyos');
            lines.push('');
            lines.push('Exported: ' + new Date().toLocaleString());
            lines.push('Device: ' + getDeviceId());
            lines.push('');
            lines.push('══════════════════════════════════════════════════════════');
            SECTIONS.forEach(s => {
                lines.push('');
                lines.push(s.title.toUpperCase());
                lines.push('──────────────────────────────────────────────────────────────');
                if (!journalOnly) {
                    lines.push(stripHtmlToText(s.content));
                    lines.push('');
                }
                lines.push('MY JOURNAL:');
                lines.push(journalData[s.id] || '(No notes for this section)');
                lines.push('');
                lines.push('══════════════════════════════════════════════════════════');
            });
            const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = journalOnly ? 'Prayer_Counseling_Journal_Only.txt' : 'Prayer_Counseling_Full_Workbook.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        window.onload = init;
    </script>
</body>
</html>
