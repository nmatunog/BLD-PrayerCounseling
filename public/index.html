            border-radius: var(--radius-card);
            box-shadow: var(--shadow-soft);

            border-radius: var(--radius-card);
            border-left: 5px solid var(--positive-accent) !important;

            border-left: 5px solid var(--negative-accent) !important;

            border-radius: var(--radius-card);
            border-left: 5px solid var(--positive-blue-accent) !important;
            box-shadow: var(--shadow-soft);

        .content-separator {

        .content-separator::after {

        .content-block {

        #content-area.space-y-8 > * + * { margin-top: 2.5rem; }

        .sidebar-deco {
            width: 64px;
            height: 64px;
            opacity: 0.35;
            margin: 0.5rem 0 0 0;
            flex-shrink: 0;

</head>

            { mod: 1, title: "Four Primary Laws", id: "m1-laws", showJournal: false, content: `
                <div class="content-reflective">
                <div class="content-block">
                <div class="section-icon-header"><i class="fa-solid fa-scale-balanced" aria-hidden="true"></i><h1 class="text-4xl lg:text-5xl text-[#5a6b52] mb-0 font-semibold tracking-tight">Four Primary Laws</h1></div>
                </div>
                <p class="text-lg text-[#7a736c] mb-8">Foundations for ministry: discernment of root issues is founded upon laws in the Word of God that are written in the universe, apply to all, and are absolute and eternal.</p>
                <div class="space-y-6">
                    ${bibleBtn("1. Honor your father and mother (Dt 5:16)", "Honor your father and your mother, as the LORD, your God, has commanded you, that you may have a long life and that you may prosper in the land the LORD, your God, is giving you.")}
                    ${bibleBtn("2. Do not judge, lest you be judged (Mt 7:1-2)", "Stop judging, that you may not be judged. For as you judge, so will you be judged, and the measure with which you measure will be measured out to you.")}
                    ${bibleBtn("3. What a person sows, that he will also reap (Gal 6:7-8)", "Do not be deceived; God is not mocked. For a person will reap only what he sows, because the one who sows for the flesh will reap corruption from the flesh, but the one who sows for the spirit will reap eternal life from the spirit.")}
                    ${bibleBtn("4. For in that you judge another, you condemn yourself (Rom 2:1)", "Therefore, you are without excuse, every one of you who passes judgment. For by the standard by which you judge another you condemn yourself, since you, the judge, do the very same things.")}
                </div>
                <div class="mt-10 p-8 bg-white rounded-[2rem] border border-[#d4ddce]">
                    <h3 class="text-xl font-black text-[#8a9a7e] mb-4">Law 4 — Explanation</h3>
                    <p class="text-lg leading-relaxed mb-4">We do not acquire the sins of others because we judge; we are already fellow sinners by nature, doing those same sins. Judging condemns us to blindly continue the same sins, making us unable to avail ourselves of God's grace and healing.</p>
                    <p class="text-lg font-semibold text-[#5a544e] mb-4">Add to these laws the principle of increase:</p>
                    <div class="space-y-4">
                        ${bibleBtn("Hosea 8:7a", "For they sow the wind, and they reap the whirlwind.")}
                        ${bibleBtn("Matthew 13:8", "But some seed fell on rich soil and produced fruit, a hundred or sixty or thirtyfold.")}
                    </div>
                </div>
                </div>
            `},

            { mod: 1, title: "Small Groups", id: "m1-smallgroups", showJournal: false, content: `

            // MODULE 2 — Source: MODULE 2-REPENTANCE-AND-RESTITUTION-2026-BY-AIMEE.pptx
            { mod: 2, title: "Repentance and Restitution", id: "m2-rep", showJournal: false, content: `
                <div class="content-reflective">
                <div class="content-block">
                <div class="section-icon-header"><i class="fa-solid fa-cross" aria-hidden="true"></i><h1 class="text-4xl lg:text-5xl text-[#5a6b52] mb-0 font-semibold tracking-tight">Repentance and Restitution</h1></div>
                </div>
                <div class="reflective-card p-10 rounded-[3rem] border border-[#d4ddce] mb-10">
                    ${cccBtn("CCC 1442 — Sacrament of Reconciliation", "It is called the sacrament of Reconciliation, because it imparts to the sinner the love of God who reconciles: \"Be reconciled to God.\" (2 Cor 5:20) He who lives by God's merciful love is ready to respond to the Lord's call: \"…go first be reconciled to your brother.\" (Matthew 5:24)")}
                    ${bibleBtn("2 Corinthians 7:9-10 (Foundation verse)", "Now I rejoice, not because you were saddened, but because you were saddened into repentance; for you were saddened in a godly way, so that you did not suffer loss in anything because of us. For godly sorrow produces a salutary repentance without regret, but worldly sorrow produces death.")}
                    ${cccBtn("CCC 1468", "Reconciliation \"is usually followed by peace and serenity of conscience with strong spiritual consolation.\" Indeed the Sacrament of Reconciliation with God brings about a true \"spiritual resurrection.\"")}
                </div>
                <div class="grid md:grid-cols-2 gap-8 mb-10">
                    ${card("Remorse is not true repentance", ["It is simply feeling sorry for what we have done because we do not like the consequences of our sin.", "Asserts the ego/self (1 Sam 13:8-9)", "Always making excuses (1 Sam 13:11-14)", "Obedience carried out for reasons of convenience (1 Sam 15:9-10)", "Taking God's forgiveness and mercy for granted", "Unable to accept full responsibility for one's action (1 Sam 15:20)", "Avoids consequences of sin (1 Sam 15:24, 26); absence of surrender (1 Sam 15:27)"], "frame-negative", "text-[#c0392b]")}
                    ${card("True repentance (2 Sam 12:1-16)", ["Humbly accepts wrongdoing", "Promptly makes up for the harm done", "Empathizes with the wounded ones", "Takes full responsibility for own sins", "Resolves to turn life around", "Asks God for the grace of transformation", "Subjects self to discipline"], "frame-positive")}
                </div>
                <div class="space-y-6 mb-10">
                    ${bibleBtn("Psalm 51:17 — Sacrifices acceptable to God", "My sacrifice, O God, is a contrite spirit; a contrite, humbled heart, O God, you will not scorn.")}
                    ${bibleBtn("Romans 2:4 — How God leads to repentance", "Do you hold his priceless kindness, forbearance, and patience in low esteem, unaware that the kindness of God would lead you to repentance?")}
                </div>
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-[#d4ddce] mb-10">
                    <h3 class="text-2xl font-black text-[#8a9a7e] mb-6">Seek restitution, not retribution</h3>
                    <p class="text-lg mb-6">Restitution is a voluntary act of making amends for what has been broken or taken, compensating for the damage done to the other person. It is God's law for healing both victim and offender.</p>
                    <div class="grid md:grid-cols-2 gap-6 mb-6">
                        <div><h4 class="font-bold text-[#8a9a7e] mb-2">For the victim</h4><p class="text-lg">Restitution enables forgiveness, restores love and trust, and paves the way for healing to take place.</p></div>
                        <div><h4 class="font-bold text-[#8a9a7e] mb-2">For the offender</h4><p class="text-lg">Restitution helps: to feel the pain of the damage caused; to bring to death sinful structures and habits; to write on the heart the price of our actions.</p></div>
                    </div>
                    <p class="text-lg mb-4">Recognize the importance of restitution as part of the process of healing and transformation (Lev 5:20-24; Ex 21:37; Lk 19:1-10).</p>
                    ${bibleBtn("Luke 19:8-9 — Zacchaeus", "Behold, half of my possessions, Lord, I shall give to the poor, and if I have extorted anything from anyone I shall repay it four times over. … Today salvation has come to this house, because this man too is a descendant of Abraham. For the Son of Man has come to seek and to save what was lost.")}
                    ${bibleBtn("2 Chronicles 7:14", "If my people, upon whom my name has been pronounced, humble themselves and pray, and seek my face and turn from their evil ways, I will hear them from heaven and pardon their sins and revive their land.")}
                </div>
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-[#d4ddce] mb-6">
                    <h3 class="text-xl font-black text-[#8a9a7e] mb-4">Closing thought</h3>
                    <p class="text-lg leading-relaxed">An important part of our faith and process of spiritual growth is to avail of confession to enable healing in our lives and in our relationships with others. We must avail of this gift and make it part of our lives. Sometimes, however, we will not always be forgiven by those we have hurt. If we have done everything to make amends, just remember that God has forgiven you, especially after Confession. God grieves when we sin. Avail of the Sacrament of Reconciliation and make amends.</p>
                </div>
                ${expandCard("A prayer of repentance", "Lord Jesus, our Redeemer and Healer of broken hearts, I come before your presence asking forgiveness for my sins. My sin has created distance between us. I have allowed arrogance and pride to rule my heart. Most of all, I have grieved your heart and have also caused considerable pain and grief to another, which resulted in a broken trust and relationship. It hurts me to see the pain I have caused you and the person I have wounded. Through the powerful working of your grace, help me to initiate reparation and enable restoration of trust and healing in our relationships. Lord Jesus, bless the person(s) I have wounded. Let your healing grace permeate his or her inner soul so that he/she may feel the comfort of your faithfulness and love. I believe in your mighty works Lord Jesus for I know today is the beginning of restoration in all my relationships. Continue to redeem me in ways I never dreamed possible. Amen.", "fa-hands-praying")}
                </div>
            `},
            // MODULE 3 — Source: MODULE 3- ACCOMPLISHING_FORGIVENESS-FEB-2023.pptx
            { mod: 3, title: "Forgiveness", id: "m3-def", showJournal: false, content: `
                <div class="content-reflective">
                <div class="content-block">
                <div class="section-icon-header"><i class="fa-solid fa-dove" aria-hidden="true"></i><h1 class="text-4xl lg:text-5xl text-[#5a6b52] mb-0 font-semibold tracking-tight">Accomplishing Forgiveness</h1></div>
                </div>
                <div class="p-12 lg:p-20 rounded-[4rem] text-white shadow-2xl text-center mb-10" style="background-color: #8a9a7e;">
                    <h2 class="text-2xl font-black mb-6">Definition of forgiveness</h2>
                    <p class="text-xl lg:text-2xl italic font-serif leading-relaxed border-l-4 border-white/30 pl-8 text-left max-w-4xl mx-auto py-4">
                        Forgiveness is surrendering to Jesus our right to hold a judgment against someone, to be paid back for sins against us, and instead, letting God be the judge and jury.
                    </p>
                    <div class="mt-12 text-left bg-white/10 p-8 rounded-3xl">
                        ${bibleBtn("Matthew 6:14-15 (Foundation scripture)", "If you forgive others their transgressions, your heavenly Father will forgive you. But if you do not forgive others, neither will your Father forgive your transgressions.")}
                    </div>
                </div>
                <div class="grid md:grid-cols-2 gap-6 mb-10">
                    ${card("Forgiveness: option or necessity?", ["If we are to be happy, healthy and grow in relationships with others, forgiveness is not an option, it is a necessity.", "Because we are commanded to forgive (Mt 6:14-15; 18:21-35; Mk 11:25-26).", "To break the effect of the law of sowing and reaping.", "It is easier when we catch our resentments quickly (1 Jn 1:9; Eph 4:32; Col 3:13).", "It is difficult when resentments are allowed to lodge in our hearts (Heb 3:12-15; Prov 26:21-26)."], "frame-positive")}
                    ${card("Forgiveness is NOT", ["Approval of what they did", "Excusing what they did", "Justifying what they did", "Pardoning what they did", "Reconciliation", "Denying what they did", "Blindness to what they did", "Forgetting", "Refusing to take the wrong seriously", "Pretending we are not hurt"], "frame-negative")}
                </div>
                <div class="grid md:grid-cols-2 gap-6 mb-10">
                    ${card("Obstacles to forgiveness", ["Denial", "Anger", "Blaming", "Vengeance", "Bitter root", "Judgment", "The \"what ifs\"", "If the person has died", "Forgiving self"], "frame-negative")}
                    ${card("Resentments lodge in our hearts when", ["We are too young to understand our anger, or to know how to pray or express forgiveness.", "We do not recognize that we are angry or hurt.", "We rationalize: \"I can handle it\" or \"Everything is OK\" or \"I have said/done everything, and I am fine.\"", "We refuse to forgive immediately."], "frame-negative")}
                </div>
                <div class="space-y-4 mb-10">
                    ${expandCard("Four levels of wounding that require forgiveness", "<strong>Bruise:</strong> Surface-level wounding which can be healed easily if treated promptly and properly. Bruises or abrasions require forgiving moment by moment.<br><br><strong>Cut:</strong> More serious wound that perhaps was inflicted intentionally. The hurt produces immediate, personal pain and will require special treatment to achieve forgiveness and healing.<br><br><strong>Open wound:</strong> Major hurt lodged in the heart that cannot be treated just by our own understanding or desire to change our feelings. The pain continues despite our consciously wanting to forgive.<br><br><strong>Crippling injury:</strong> Deep wounds of the spirit resulting in pervasive attitudes of unforgiveness toward life. The actual wound or its ramifications may not be in one's conscious awareness.", "fa-bandage")}
                    ${expandCard("Role of prayer partner & process", "<strong>Recognize the love of God.</strong> It is not our sin but God's love that is central. When God's love touches us, we see how far we have been from him, and from really living the right relationship with others and ourselves. Discover who and what needs to be forgiven, and how.<br><br><strong>The process of leading to forgiveness:</strong> Recognize areas of unforgiveness → Encourage forgiveness by faith → Pray aloud to express forgiveness → Repay with blessings → Forgive self → Receive the Sacrament of Reconciliation and Holy Eucharist.", "fa-hand-holding-heart")}
                    ${expandCard("Closing thoughts", "Every day we are challenged to make a decision — to forgive or to love. Forgiveness is a gift you give to yourself. Forgiveness is not total forgiveness until we bless our enemies. Pope Francis: \"Forgiveness is the joy of God. The joy of God is ultimately found in pardoning another for his wrongdoing. The joy of God is to forgive.\"", "fa-quote-right")}
                </div>
                </div>
            `},
            { mod: 3, title: "Forgiveness Prayer", id: "m3-prayer", showJournal: false, content: `
                <div class="content-reflective">
                <div class="content-block">
                <h1 class="text-2xl font-semibold text-[#5a6b52] mb-10 text-center">The Forgiveness Prayer</h1>
                </div>
                <div class="space-y-4">
                    ${expandCard("Step 1: Release", "Thank You, Jesus, for taking forgiveness out of my hands. It is not an option. You simply said I have to do it, yet I can't even do that! Do for me what I cannot do for myself. For Your sake, I will release any right I felt was mine to throw people into a debtor’s prison. Lord, I release _______; I forgive them for _______. Before You and my counselor as witness, they owe me nothing. I give You the right to hold them accountable for their actions. Lord, dismantle the prison I built for others.")}
                    ${expandCard("Step 2: Self-Forgiveness", "Lord, take the keys to the prison of unforgiveness I build for myself. Release me from trying to make up for what I did, judgments I made, etc., to be worthy. You alone are my worth. I release to You the feelings I have had against myself. Help me to forgive myself for what I did or did not do. I want to receive Your forgiveness. I give up any right to hold myself accountable or to punish myself for my lack of performance.")}
                    ${expandCard("Step 3: God Expectations", "I release You, God, from the expectations I have had of You. Your ways are not my ways. I can never wrap my mind around forgiveness, nor fully understand it, and I don’t know how it works. When life did not go the way I planned or expected, I became angry and resentful. Lord, forgive me for what I perceived to be sins of omission on Your part. Forgive my anger; help me to accept Your ways. Teach me.")}
                    ${expandCard("Step 4: Relinquishing Vengeance", "I often want those who hurt me to hurt like I do. I want them to know the enormity of what they did to me and to be sorry. Lord, I know that is vengeance, and that is Your territory. Forgive me for taking Your place in my desire for vengeance. Thank You for not making me pretend that everything is all right or that it doesn't matter. Thank You for listening to my expression of pain.")}
                    ${expandCard("Step 5: Healing & Restoration", "Lord, wash my mind, spirit and emotions of the acid of pain, resentment and anger. Clothe me in Your righteousness. I know that You will heal me in time, and I will be able to forgive emotionally as well as feeling the joy of extending mercy. Until then, Lord, please keep me and heal my wounded spirit and this bruise. Thank You for restored relationship with You, Father. Amen.")}
                </div>
                </div>
            `},
            { mod: 3, title: "Guide for Small Group I", id: "m3-guide1", showJournal: false, content: `

            // MODULE 4: BITTER ROOTS (source: MODULE 4 2026-BITTER-ROOTS-FINAL.ppt and MODULE 5-6-7 PDF)
            { mod: 4, title: "Bitter Roots — Scripture & Definition", id: "m5-def", showJournal: false, content: `
                <div class="content-reflective">
                <div class="content-block">
                <div class="section-icon-header"><i class="fa-solid fa-seedling" aria-hidden="true"></i><h1 class="text-4xl lg:text-5xl text-[#5a6b52] mb-0 font-semibold tracking-tight">Bitter Roots</h1></div>
                </div>
                <p class="text-sm text-[#7a736c] mb-6 font-bold uppercase tracking-widest">Scripture Foundation</p>
                <div class="reflective-card frame-positive p-8 lg:p-10 rounded-[2rem] border-l-4 border-[#8a9a7e] mb-10">
                    <p class="font-serif italic text-xl text-[#4a4540] leading-relaxed">"See to it that no one be deprived of the grace of God, that no bitter root spring up and cause trouble, through which many become defiled."</p>

                </div>
                ${bibleBtn("Hebrews 12:15", "See to it that no one be deprived of the grace of God, that no bitter root spring up and cause trouble, through which many may become defiled.")}
                <div class="reflective-card frame-negative p-8 rounded-[2rem] mt-10">
                    <p class="text-lg text-[#2a2724] leading-relaxed mb-4">The law of judgment applies not only to our conscious actions, known and performed outwardly, but also to what is lodged in our hearts, reserved, unknown and unexpressed. Once formed, judgments bring results. Bitter roots not brought to the Cross defile.</p>
                </div>
                <div class="content-block mt-10">
                <h2 class="text-2xl font-semibold text-[#5a6b52] mb-6">What is a root?</h2>
                </div>
                <p class="text-lg text-[#2a2724] leading-relaxed mb-6">A root is a hidden, an underground structure that provides nourishment. For us, "roots" are habitual ways we drink nurture from God, others, nature and ourselves. Our roots lie beneath the surface, usually hidden to the adult mind.</p>
                <ul class="space-y-3 text-[#2a2724] list-none mb-6">
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> If we have bitter roots, we drink harm to ourselves.</li>
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#4caf50] mt-2 shrink-0"></span> If we are rooted in Christ, we drink nourishment from God and His creation.</li>
                </ul>
                <div class="content-block">
                <h2 class="text-2xl font-semibold text-[#5a6b52] mb-6">What are bitter roots or bitter root judgments?</h2>
                </div>
                <ul class="space-y-3 text-[#2a2724] list-none mb-8">
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> Sinful reactions to hurt</li>
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> Critical, condemning judgments of people</li>
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> Refusal or inability to forgive someone</li>
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> They have the power to defile many, including ourselves, causing us to drink "poison" instead of nourishment.</li>
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> They operate according to the unchangeable law of sowing and reaping, which causes us to reap in kind what we have sown. (Galatians 6:7)</li>
                </ul>
                <div class="reflective-card p-8 rounded-[2rem] border border-[#d4ddce] mb-8">
                    <h4 class="font-serif text-xl text-[#5a6b52] mb-4">Bitter roots are NOT:</h4>
                    <ul class="space-y-2 text-[#2a2724] list-none">
                        <li class="flex gap-3"><span class="text-[#c62828]">•</span> The hurtful or terrible things that happen to us, nor the sins of those who have wronged us; <strong>they are our sins.</strong></li>
                        <li class="flex gap-3"><span class="text-[#c62828]">•</span> Powerful enough to overcome the free will of another, but they do defile.</li>
                    </ul>
                </div>
                ${bibleBtn("Galatians 6:7", "Do not be deceived; God is not mocked. For a person will reap only what he sows.")}
                <div class="content-block mt-10">
                <h2 class="text-2xl font-semibold text-[#5a6b52] mb-6">Bitter roots infect the mind with expectancies</h2>
                </div>
                <ul class="space-y-3 text-[#2a2724] list-none mb-8">
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> Psychological practices in our nature</li>
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> Habits of self-fulfilling prophecy, by which we push people to fulfill our picture of the way things should go.</li>
                </ul>
                <div class="reflective-card p-8 rounded-[2rem] border-l-4 border-[#8a9a7e] mb-8">
                    <h4 class="font-serif text-[#5a6b52] mb-4">Bitter Root Expectation Example</h4>
                    <p class="text-[#2a2724] mb-2">A man brought up by a critical mother:</p>
                    <ul class="space-y-2 text-[#2a2724] list-none text-sm">
                        <li class="flex gap-2"><span class="text-[#8a9a7e]">•</span> feels wounded and rejected, he protects his heart by withdrawing</li>
                        <li class="flex gap-2"><span class="text-[#8a9a7e]">•</span> his experiences with his mother form his picture of a "woman"</li>
                        <li class="flex gap-2"><span class="text-[#8a9a7e]">•</span> when he marries, he expects criticism and projects his expectancies onto his wife</li>
                        <li class="flex gap-2"><span class="text-[#8a9a7e]">•</span> he keeps her distant to protect himself</li>
                        <li class="flex gap-2"><span class="text-[#8a9a7e]">•</span> lonely, she appeals to him to share with her – he interprets this as criticism</li>
                        <li class="flex gap-2"><span class="text-[#8a9a7e]">•</span> when she becomes openly critical of his treatment of her, he doesn't see his part in pushing her to fulfill that expectation</li>
                    </ul>
                </div>
                <h4 class="font-serif text-xl text-[#5a6b52] mb-4">Where do we find judgments and expectancies?</h4>
                <ul class="space-y-2 text-[#2a2724] list-none mb-8">
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> Our relationship with our parents and the relationship between our parents</li>
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> Primary people during our foundation years – grandparents, babysitters, primary school teachers</li>
                </ul>
                <h4 class="font-serif text-xl text-[#5a6b52] mb-4">Four basic laws that govern our relationships</h4>
                <div class="space-y-4 mb-8">
                    ${bibleBtn("Deut. 5:16 — Law of Honoring & Dishonoring", "Honor your father and your mother, as the LORD, your God, has commanded you, that you may have a long life and that you may prosper in the land the LORD, your God, is giving you.")}
                    ${bibleBtn("Matt. 7:1-2 — Law of Judging & Receiving", "Stop judging, that you may not be judged. For as you judge, so will you be judged, and the measure with which you measure will be measured out to you.")}
                    ${bibleBtn("Gal. 6:7-8 — Law of Sowing & Reaping", "Do not be deceived; God is not mocked. For a person will reap only what he sows, because the one who sows for the flesh will reap corruption from the flesh, but the one who sows for the spirit will reap eternal life from the spirit.")}
                    ${bibleBtn("Romans 2:1 — Law of becoming what we judge", "Therefore, you are without excuse, every one of you who passes judgment. For by the standard by which you judge another you condemn yourself, since you, the judge, do the very same things.")}
                </div>
                <div class="reflective-card frame-positive p-8 rounded-[2rem]">
                    <p class="text-lg text-[#2a2724] leading-relaxed mb-4">We are accountable for our sinful reactions and our judgments, no matter what happened to us.</p>
                    <ul class="space-y-2 list-none">
                        <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#4caf50] mt-2 shrink-0"></span> We are guilty, but not condemned.</li>
                        <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#4caf50] mt-2 shrink-0"></span> Guilt is the friend, which brings us to the Cross, to healing and transformation.</li>
                    </ul>
                </div>
                </div>
            `},
            { mod: 4, title: "Healing for Bitter Roots & Sample Prayers", id: "m5-check", showJournal: true, content: `
                <div class="content-reflective">

                    <div><h4 class="font-serif text-xl text-[#5a6b52] mb-3">C. Repentance</h4><p class="text-[#2a2724]">Choosing change, determining to stop patterns by bringing judgments and expectancies to death on the cross in prayer.</p></div>

                        <p class="text-[#7a736c] font-semibold mb-2">2. Prayers of death</p>

                    </div>
                    <div><h4 class="font-serif text-xl text-[#5a6b52] mb-3">E. Restitution</h4><p class="text-[#2a2724]">This may be necessary to restore trust in relationships and build new structures in a person's life.</p></div>
                    <div><h4 class="font-serif text-xl text-[#5a6b52] mb-3">F. Healing continues as the counselee continues</h4><p class="text-[#2a2724]">In fellowship, and in counseling to discover branch roots; in prayer as an ongoing discipline; to see and bring to death habitual ways of thinking, feeling and behaving; to bring to life the nature of Christ.</p></div>
                    <div><h4 class="font-serif text-xl text-[#5a6b52] mb-3">G. Healing is accomplished</h4><p class="text-[#2a2724]">When gratitude is full, not forced; when transformation has turned the "mess" into glory of God.</p></div>

                <div class="reflective-card p-8 rounded-[2rem] border-2 border-[#d4ddce] mb-10">

                    <p class="text-[#2a2724] leading-relaxed">It is a painful process when a couple begins to discover hidden things about one another. But it is God's design and as we take our sins to the cross, we can enter into a blessed relationship with our spouse and other people, fulfilling God's will for transformation in our lives.</p>

                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> Do I have habits that I hate but can't stop?</li>
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> Do I feel like I have to EARN everything? (Lack of trust)</li>

                    <p class="font-serif italic text-xl text-[#4a4540] leading-relaxed">"I will remove the hearts of stone, and give them hearts of flesh, so that they walk according to my statutes, taking care to keep my ordinances. Thus they will be my people and I will be their God."</p>

                <div class="space-y-4 mb-8">
                    ${cccBtn("CCC 2563", "The heart is our hidden center, beyond the grasp of our reason and of others; only the Spirit of God can fathom the human heart and know it fully. The heart is the place of decision, deeper than our psychic drives. It is the place of truth, where we choose life or death. It is the place of encounter, because as image of God we live in relation: it is the place of covenant.")}
                    ${cccBtn("CCC 2562", "Where does prayer come from? Whatever the language of prayer (gestures and words), the one who prays is the whole person. But to name the source of prayer is to designate the wellspring: the Holy Spirit. The Spirit is the living water \"welling up to eternal life\" in the heart that prays. The Spirit is the one who teaches us to receive God by recalling Christ to us. The Spirit cannot be divided from our personal prayer.")}
                    ${cccBtn("CCC 2517", "The heart is the seat of moral personality: \"Out of the heart come evil thoughts, murder, adultery, fornication. . . .\" Our Lord teaches that the heart is the source of our moral choices and that purity of heart enables us to see God.")}

                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> "Take care…lest there be in any of you an evil, unbelieving heart, leading you to fall away from God…Who were they that heard and yet were rebellious?" (Hebrews 3:12-13, 15)</li>
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> A defense or coping mechanism; a place to hide, to shield us from hurts. A wall we build to protect us from hurt, but which make us lonely and miserable.</li>

                ${bibleBtn("Ephesians 4:18-19", "They are darkened in their understanding, alienated from the life of God because of their ignorance, due to their hardness of heart. They have become callous and have handed themselves over to licentiousness for the practice of every kind of impurity to excess.")}
                ${bibleBtn("Hebrews 3:12-13, 15", "Take care, brothers, that none of you may have an evil and unfaithful heart, so as to forsake the living God. Encourage yourselves daily while it is still \"today,\" so that none of you may grow hardened by the deceit of sin. … If only you would hear his voice today: \"Do not harden your hearts as at the rebellion.\"")}
                <div class="content-block mt-10">
                <h2 class="text-2xl font-semibold text-[#5a6b52] mb-6">Heart of Stone: How It Is Formed In Early Years</h2>
                </div>
                <p class="text-[#2a2724] mb-4">"Sinful" response to our earliest experiences of rejection, frustration, unmet needs, dissatisfaction:</p>
                <ul class="space-y-3 text-[#2a2724] list-none mb-4">
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> <strong>In-utero:</strong> A mother was entertaining the thought of abortion or having the child adopted. The baby in the womb senses this and feels unwanted. An expecting couple wants a boy but the baby in the womb is a girl. The baby feels rejection and afraid to reveal herself knowing parents will be disappointed.</li>
                    <li class="flex gap-3"><span class="w-2 h-2 rounded-full bg-[#8a9a7e] mt-2 shrink-0"></span> <strong>Crib experience:</strong> Baby cries wanting the mother's breast, but instead gets a change of diaper. Or baby cries because of soiled diaper but is given milk instead. Baby is frustrated but can't speak.</li>
                </ul>
                <p class="text-[#2a2724] mb-8">Inability to process good or bad, right or wrong, and not knowing how to forgive creates in the child a disposition to hardening of heart.</p>

                ${bibleBtn("2 Chronicles 36:13b", "He stiffened his neck and hardened his heart against turning to the LORD, the God of Israel.")}
                <div class="reflective-card frame-positive p-8 rounded-[2rem] mt-8">

            { mod: 5, title: "Healing the Heart of Stone & Prayer", id: "m6-healing", showJournal: false, content: `
                <div class="content-reflective">

                    <p class="font-serif italic text-xl lg:text-2xl text-[#4a4540] leading-relaxed">"Yet You drew me forth from the womb, made me safe at my mother's breast. Upon You, I was thrust from the womb; since birth, You are my God."</p>

            { mod: 9, title: "Prenatal Wounds and Sins — Catholic Teaching", id: "m10-teaching", showJournal: true, content: `
                <div class="content-reflective">
                <div class="content-block">
                <h2 class="text-2xl font-semibold text-[#5a6b52] mb-6">Prenatal Wounds and Sins</h2>
                </div>
                <div class="space-y-6 text-lg text-[#2a2724] leading-relaxed mb-8">
                    <p>As we mature, we interpret experiences with our mind, but before we have a developed intellect with which to reason, we have a spirit within us.</p>
                    <p>As we begin to form within the womb, that breath from God which is the core of our essence begins to respond sensitively to the world around it.</p>
                    <p class="font-semibold text-[#5a6b52]">Thus we are able to be wounded and to sin in response to hurts received in the womb.</p>
                </div>
                <h4 class="font-serif text-xl text-[#5a6b52] mb-4">Catholic Church Teaching</h4>
                ${cccBtn("CCC 1703", "Endowed with 'a spiritual and immortal' soul, the human person is 'the only creature on earth that God has willed for its own sake.' From his conception, he is destined for eternal life.")}
                ${cccBtn("Gaudium et Spes 14", "Though made of body and spiritual soul, man is one.")}
                ${cccBtn("Gaudium et Spes 60", "But from the time of fertilization, a life is begun which is neither that of the father or the mother; it is rather the life of a new human being with his own growth. It would never be made human if it were not human already. Modern genetic science offers clear confirmation: It has demonstrated that from the first instant there is established the programme of what this living being will be: a person, this individual person with his characteristic aspects already well determined.")}
                </div>
            `},
            { mod: 9, title: "Can We Sin In Our Personal Spirits?", id: "m10-spirit", showJournal: false, content: `
                <div class="content-reflective">
                <div class="content-block">
                <h2 class="text-2xl font-semibold text-[#5a6b52] mb-6">Can We Sin In Our Personal Spirits?</h2>
                </div>
                <p class="text-[#7a736c] text-lg mb-6">To sin is to miss the mark. Scripture indicates that we do sin in our personal spirits. Our spirits can be deceptive, waver from the truth, be unfaithful to God, and be defiled along with the flesh.</p>
                <div class="space-y-4">
                    ${bibleBtn("Psalm 32:2", "Happy those to whom the Lord imputes no guilt, in whose spirit is no deceit.")}
                    ${bibleBtn("Psalm 51:12", "A clean heart create for me, God, and renew in me a steadfast spirit.")}
                    ${bibleBtn("Psalm 78:8b", "A generation whose heart was not constant, whose spirit was not faithful to God.")}
                    ${bibleBtn("2 Corinthians 7:1", "Since we have these promises, beloved, let us cleanse ourselves from every defilement of flesh and spirit, making holiness perfect in the fear of God.")}
                </div>
                <div class="content-separator" aria-hidden="true"></div>
                <div class="reflective-card p-8 rounded-[2rem] border border-[#d4ddce] mt-8">
                    <h4 class="font-serif text-[#5a6b52] mb-4">Can a child in the womb have sinful reactions?</h4>
                    <p class="text-[#2a2724] leading-relaxed mb-4">Yes, because of original sin. Like all of humanity, we inherited original sin from Adam and Eve, and we are thus deprived of original holiness and justice (CCC 416). But it is not a sin in the sense of doctrine: full knowledge and full consent of the will.</p>
                    <p class="text-[#7a736c] italic text-sm mb-4">Scripture says that we are sinners from the beginning:</p>
                    <ul class="space-y-3 list-none">
                        <li class="p-4 border-l-4 border-[#d4ddce] bg-white rounded-r-xl text-[#2a2724]">Ps 58:4 — "The wicked have been corrupt since birth; liars from the womb."</li>
                        <li class="p-4 border-l-4 border-[#d4ddce] bg-white rounded-r-xl text-[#2a2724]">Is 48:8b — "I know you are utterly treacherous, a rebel you were called from birth"</li>
                        <li class="p-4 border-l-4 border-[#d4ddce] bg-white rounded-r-xl text-[#2a2724]">Ps 51:7 — "True, I was born guilty, a sinner even as my mother conceived me"</li>
                    </ul>
                </div>
                </div>
            `},
            { mod: 9, title: "Our Personal Spirit & Baby in the Womb", id: "m10-research", showJournal: true, content: `
                <div class="content-reflective">
                <h4 class="text-[#8a9a7e] font-bold text-xs uppercase tracking-widest mb-4">Given to us by God · Gives life to our body</h4>
                ${bibleBtn("Genesis 2:7", "The Lord God formed man out of the clay of the ground and blew into his nostrils the breath of life, and so man became a living being.")}
                ${bibleBtn("James 2:26a", "For just as a body without a spirit is dead…")}
                <h4 class="text-[#8a9a7e] font-bold text-xs uppercase tracking-widest mt-8 mb-4">We have understanding in our spirit · Our spirit is eternal</h4>
                ${bibleBtn("Job 32:8", "But it is a spirit in man, the breath of the Almighty, that gives him understanding.")}
                ${bibleBtn("Luke 1:44", "For at the moment the sound of your greeting reached my ears, the infant in my womb leaped for joy.")}
                ${bibleBtn("Ecclesiastes 12:7", "And dust returns to the earth as it once was, and the life breath returns to God who gave it.")}
                <div class="content-separator" aria-hidden="true"></div>
                <div class="reflective-card frame-positive p-8 rounded-[2rem] mt-8">
                    <h4 class="font-serif text-[#5a6b52] mb-4">Baby in the womb</h4>
                    <p class="text-[#2a2724] leading-relaxed mb-4">In biblical times, pregnant women spent time in seclusion—praying, meditating and singing psalms—believing that the child's character is formed during the first three months in the womb.</p>
                    <p class="font-semibold text-[#5a6b52] mb-3">Modern research confirms that:</p>
                    <ul class="space-y-2 text-[#2a2724] list-none">
                        <li class="flex gap-3"><i class="fa-solid fa-circle-check text-[#8a9a7e] mt-1 shrink-0" aria-hidden="true"></i> Unborn babies hear, taste, feel and learn in the womb</li>
                        <li class="flex gap-3"><i class="fa-solid fa-circle-check text-[#8a9a7e] mt-1 shrink-0" aria-hidden="true"></i> Womb experiences shape the child's attitudes and expectations</li>
                        <li class="flex gap-3"><i class="fa-solid fa-circle-check text-[#8a9a7e] mt-1 shrink-0" aria-hidden="true"></i> Deep, persistent patterns of feeling in the mother affect the unborn child</li>
                        <li class="flex gap-3"><i class="fa-solid fa-circle-check text-[#8a9a7e] mt-1 shrink-0" aria-hidden="true"></i> The father's feelings about the wife and unborn child also affect the pregnancy</li>
                        <li class="flex gap-3"><i class="fa-solid fa-circle-check text-[#8a9a7e] mt-1 shrink-0" aria-hidden="true"></i> If the womb is friendly, a baby may be predisposed to good health and normal development; if unfriendly, to ill health, nervousness, irritability and arrested development</li>
                    </ul>
                    <p class="text-[#7a736c] italic text-sm mt-4">(From T. Verney's The Secret Life of the Unborn Child)</p>
                </div>
                <div class="reflective-card p-8 rounded-[2rem] border border-[#d4ddce] mt-8">
                    <h4 class="font-serif text-[#5a6b52] mb-4">What Mommy feels, baby feels</h4>
                    <p class="text-[#2a2724] mb-3">Ambivalent feelings; remembered womb experiences (birth trauma, induced labor); behaviors in infancy and adulthood that correspond to known womb experiences. Sound impacts the unborn: quarreling, yelling, loud noises; music (e.g. Vivaldi & Mozart calms; Beethoven & rock may cause kicking, violent motions).</p>
                </div>
                </div>
            `},

            { mod: 9, title: "Abortions — Recognition & Healing", id: "m10-abortions", showJournal: false, content: `
                <div class="content-reflective">

            { mod: 9, title: "Four Common In-Utero Experiences", id: "m10-experiences", showJournal: true, content: `
                <div class="content-reflective">
                <div class="content-block">
                <h2 class="text-2xl font-semibold text-[#5a6b52] mb-6">Healing Four Common In-Utero Experiences</h2>
                </div>
                <ul class="space-y-3 text-[#2a2724] font-medium list-none mb-8">
                    <li class="flex gap-3"><span class="text-[#8a9a7e]">•</span> Child conceived out of wedlock</li>
                    <li class="flex gap-3"><span class="text-[#8a9a7e]">•</span> Child comes at a bad time for the family</li>
                    <li class="flex gap-3"><span class="text-[#8a9a7e]">•</span> Child is perceived as the "wrong" sex</li>
                    <li class="flex gap-3"><span class="text-[#8a9a7e]">•</span> Child is put up for adoption</li>
                </ul>
                <div class="reflective-card p-6 rounded-[2rem] border border-[#d4ddce] mb-8 italic text-[#7a736c] text-sm">
                    It is not what happens to a child inside or outside the womb, but how a child responds. Not all children with similar womb experiences react the same way. God's grace may have intervened. Everything is possible with the Lord.
                </div>
                <h4 class="font-serif text-xl text-[#5a6b52] mb-4">In-Utero Experiences Overview</h4>
                <p class="text-[#2a2724] mb-3"><strong>Conceived out of wedlock:</strong> The child senses the situation—feels the shame, hurt, fear or insecurity of both mother & father.</p>
                <p class="text-[#2a2724] mb-3"><strong>Born at the wrong time:</strong> Family difficulties (economic depression, loss of income; poor health; absent father; recent loss of a child).</p>
                <p class="text-[#2a2724] mb-3"><strong>Perceived as "wrong sex":</strong> The spirit of the child in the womb knows he or she is not who the parents wanted.</p>

                            <tr><td class="p-4 font-semibold">Perceived as "wrong sex"</td><td class="p-4">Death Wish, Performance Orientation, Shame, Rebellion, Confusion, Secrecy, Lying</td></tr>

                </div>

            { mod: 9, title: "Healing — Conceived Out of Wedlock / Wrong Time", id: "m10-heal-wedlock-time", showJournal: false, content: `

                <ul class="space-y-2 text-[#2a2724] list-none mb-8">

                    <li class="flex gap-3"><span class="text-[#8a9a7e]">•</span> Speak on the Lord's behalf: You are not an accident, a burden or a mistake. You are a gift, a joy.</li>

            { mod: 9, title: "Healing — Wrong Sex & Adoption", id: "m10-heal-sex-adopt", showJournal: false, content: `

            { mod: 9, title: "Determining if Ministry is Needed", id: "m10-diagnosis", showJournal: true, content: `

                    <li class="flex gap-3"><i class="fa-solid fa-circle-check text-[#8a9a7e] mt-1 shrink-0" aria-hidden="true"></i> Does he neglect his appearance, or anxiously spend too much energy on it? Is he prone to jealousy? Put himself down or brag too much?</li>
                    <li class="flex gap-3"><i class="fa-solid fa-circle-check text-[#8a9a7e] mt-1 shrink-0" aria-hidden="true"></i> Does he have trouble following through with projects? Always seem to be a spectator, on the outside looking in?</li>

            { mod: 9, title: "A Prayer for In Utero Wounding", id: "m10-prayer", showJournal: false, content: `
                <div class="content-reflective">
                <div class="content-block">
                <h2 class="text-2xl font-semibold text-[#5a6b52] mb-8">A Prayer for In Utero Wounding</h2>
                </div>
                <div class="bg-[#fef3c7]/40 p-10 rounded-[3rem] border-2 border-[#d4ddce] shadow-lg space-y-8">
                    <p class="font-serif italic text-lg text-[#2a2724] leading-relaxed">"Lord Jesus, we ask You to identify with (counselee) as a little one being formed. Speak to her spirit and communicate to that little one that You knew about her and all the circumstances she entered into. You planned for her, Lord, and You delighted in her birth. Let (counselee) know she is not a mistake, a burden or an accident, but a gift and a joy."</p>
                    <p class="font-serif italic text-lg text-[#2a2724] leading-relaxed">"Lord, we ask for Your empowerment to forgive. (Pray to forgive parents, to confess anger, to ask forgiveness for judgments, and for specific things the Holy Spirit has revealed. Give assurance of forgiveness.)"</p>
                    <p class="font-bold not-italic text-sm text-[#8a9a7e] uppercase tracking-widest">1. Lord, remove the shame of illegitimacy</p>
                    <p class="font-bold not-italic text-sm text-[#8a9a7e] uppercase tracking-widest">2. Remove the shame of being the wrong sex</p>
                    <p class="font-bold not-italic text-sm text-[#8a9a7e] uppercase tracking-widest">3. Lift out the guilt of being formed and born at a bad time, of causing the mother health problems, of creating a financial burden</p>
                    <p class="font-serif italic text-lg text-[#2a2724] leading-relaxed pt-4">"Lift it out Lord and minister to the hurt and anger of feeling unwelcome, the fear that there will not be enough time, money or nurture. Bring to death the death wish, accident proneness and performance orientation. Bring to death any confusion of gender—the secrecy, deception and isolation it causes."</p>

            { mod: 10, title: "The P.O. / Depression Cycle", id: "m11-cycle", showJournal: true, content: `
                <div class="content-reflective">
                <div class="content-block">
                <h2 class="text-2xl font-semibold text-[#5a6b52] mb-6">The Cycle</h2>
                </div>
                <div class="reflective-card p-8 rounded-[2rem] border-2 border-[#d4ddce] mb-8">
                    <p class="text-center text-[#7a736c] font-bold uppercase tracking-widest text-sm mb-6">Cycle stages</p>
                    <p class="text-center text-[#2a2724] leading-relaxed">More work, more love → On top of world → Disillusion → The Black Hole → Unable to work, to earn love → Things are getting better</p>
                </div>
                <p class="text-lg text-[#2a2724] leading-relaxed mb-6">This cycle is a common dynamic in people dealing with performance orientation. As these individuals come to believe the lie that they must earn the right to be loved, they work harder and harder to perform. This performance is rewarded in countless ways: the job promotion, the higher pay, the status, the compliments, the sense of well-being that comes with approval and acceptance. It all seems so perfect!</p>
                <p class="text-lg text-[#2a2724] leading-relaxed mb-6">But something begins to happen. The more performance-oriented people strive, the less reward there seems to be. They have passed the top of the cycle, doing more and more and receiving less and less reward. At some point, their spirits realize that their efforts are not getting the desired results. Everything they do to please others and to be accepted is not bringing peace. In its place have come anxiety, tension and an increasing sense of futility.</p>
                <p class="text-lg text-[#2a2724] leading-relaxed mb-6">At this point, a mild depression may set in. It is not always noticed right away and usually is not tended to. Work is no longer rewarding, hence there is decreased performance and thus less affirmation. The depression deepens, spiraling quickly. Less reward, more depression, less ability to perform, less reward, deeper depression until the debilitating spiral empties into a "black hole". The depressed performers may live in that hole for some time, in the company of stored angers, hates, disappointments, and a sense of numbness. There are no vivid colors or sweet sounds. The spirit may shut down and can no longer support vitality in the body or soul. This is the bottom of the cycle.</p>
                <p class="text-lg text-[#2a2724] leading-relaxed">At some point, these people may realize they are not getting the needed love and acceptance, and begin working to "get themselves back on track." Out of nowhere they seem to be able to muster just enough strength to "earn" that all-important pat on the back, that "fix" of love that sends a surge of life-giving energy. Every little bit of renewed strength enables them to perform again. Signs of acceptance and love appear more frequently and depression lifts. Unfortunately, the cycle is only beginning again.</p>
                </div>
            `},

                'm7-outgrowths': 'fa-seedling',
                'm7-traits': 'fa-list-check',
                'm7-fruits': 'fa-apple-whole',
                'm7-break': 'fa-hand-holding-heart',
                'm7-prayer': 'fa-hands-praying',
                'm8-s01': 'fa-hands-holding-child',
                'm8-wrap': 'fa-lightbulb',
                'm9-intro': 'fa-child',
                'm9-foundation': 'fa-book-open',
                'm9-phase1': 'fa-heart',
                'm9-phase2': 'fa-user',
                'm9-phase34': 'fa-people-group',
                'm9-phase5': 'fa-sun',
                'm9-healing': 'fa-hand-holding-heart',
                'm9-prayer': 'fa-hands-praying',
                'm10-intro': 'fa-heart',
                'm10-teaching': 'fa-book-open',
                'm10-spirit': 'fa-dove',
                'm10-research': 'fa-flask',
                'm10-books': 'fa-book',
                'm10-abortions': 'fa-hand-holding-heart',
                'm10-experiences': 'fa-layer-group',
                'm10-heal-wedlock-time': 'fa-wand-magic-sparkles',
                'm10-heal-sex-adopt': 'fa-people-group',
                'm10-diagnosis': 'fa-clipboard-check',
                'm10-prayer': 'fa-hands-praying',
                'm10-end': 'fa-circle-check',
                'm11-intro': 'fa-bullseye',
                'm11-definition': 'fa-align-left',
                'm11-types': 'fa-code-branch',
                'm11-roots': 'fa-seedling',
                'm11-fruits1': 'fa-list-check',
                'm11-fruits2': 'fa-list-check',
                'm11-results': 'fa-chart-line',
                'm11-healing1': 'fa-hand-holding-heart',
                'm11-healing2': 'fa-hand-holding-heart',
                'm11-cycle': 'fa-arrows-rotate',
                'm11-prayer1': 'fa-hands-praying',
                'm11-prayer2': 'fa-hands-praying',
                'm11-scripture': 'fa-book-bible',
                'm10-guide3': 'fa-list-check',
                'm12-wrapup': 'fa-circle-check'
            };
            SECTIONS.forEach(s => {
                if(s.mod !== currentMod) {
                    currentMod = s.mod;
                    const modLabel = modNames[currentMod] ? `Module ${currentMod}: ${modNames[currentMod]}` : `Module ${currentMod}`;
                    html += `<h3 class="sidebar-module-label">${modLabel}</h3>`;
                }
                const icon = navIcons[s.id] || 'fa-circle-dot';
                html += `<button type="button" id="nav-${s.id}" onclick="navigate('${s.id}')" class="nav-btn w-full text-left mb-1" aria-current="false"><span class="nav-btn-icon"><i class="fa-solid ${icon}" aria-hidden="true"></i></span><span class="flex-1 truncate">${s.title}</span></button>`;
            });
            menu.innerHTML = html;
        }

        function renderContent() {
            const section = SECTIONS.find(s => s.id === activeId);
            const area = document.getElementById('content-area');
            if (!section) return;

            const showJournal = section.showJournal !== false;
            area.innerHTML = `
                <div class="animate-in fade-in slide-in-from-bottom-2 duration-500">
                    ${section.content}
                    ${showJournal ? `
                    <div class="note-box mt-16 p-8 journal-box shadow-sm">
                        <h3 class="font-serif font-black text-[#8a9a7e] text-2xl mb-2 uppercase flex items-center gap-4"><i class="fa-solid fa-pen-nib" aria-hidden="true"></i> Journal Entry</h3>
                        <p class="text-sm text-[#7a736c] mb-4">Saved automatically on this device. Use the download button to export the full workbook with all sections and your notes.</p>
                        <label for="note-${activeId}" class="sr-only">Your reflections for this section</label>
                        <textarea id="note-${activeId}" oninput="saveNote('${activeId}', this.value)" class="w-full min-h-[12rem] bg-transparent border-2 border-[#d4ddce] rounded-xl focus:outline-none focus:border-[#8a9a7e] focus:ring-2 focus:ring-[#8a9a7e]/20 p-4 text-lg" placeholder="Enter your personal reflections here..." aria-label="Journal entry for this section">${journalData[activeId] || ''}</textarea>
                        <p class="mt-3 text-sm"><button type="button" onclick="downloadWorkbook(true)" class="text-[#8a9a7e] font-bold underline hover:no-underline">Download journal only</button> · <button type="button" onclick="downloadWorkbook(false)" class="text-[#8a9a7e] font-bold underline hover:no-underline">Download full workbook</button></p>
                    </div>
                    ` : ''}
                </div>
            `;
            updateNavUI();
        }

        function navigate(id) {
            activeId = id;
            renderContent();
            if(window.innerWidth < 1024) toggleSidebar();
            window.scrollTo(0,0);
        }

        function navigateNext() {
            const idx = SECTIONS.findIndex(s => s.id === activeId);
            if(idx < SECTIONS.length -1) navigate(SECTIONS[idx+1].id);
        }

        function navigatePrev() {
            const idx = SECTIONS.findIndex(s => s.id === activeId);
            if(idx > 0) navigate(SECTIONS[idx-1].id);
        }

        function updateNavUI() {
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active');
                b.removeAttribute('aria-current');
            });
            const activeBtn = document.getElementById(`nav-${activeId}`);
            if (activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.setAttribute('aria-current', 'true');
                activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth', inline: 'nearest' });
            }

            const idx = SECTIONS.findIndex(s => s.id === activeId);
            document.getElementById('prev-btn').disabled = idx === 0;
            document.getElementById('next-btn').disabled = idx === SECTIONS.length - 1;
            document.getElementById('page-indicator').innerText = `Step ${idx + 1} of ${SECTIONS.length}`;
        }

        function toggleExpansion(btn) {
            const content = btn.nextElementSibling;
            const icon = btn.querySelector('.expand-icon, i.fa-chevron-down, i.fa-chevron-up');
            if (content) {
                content.classList.toggle('open');
                btn.setAttribute('aria-expanded', content.classList.contains('open'));
            }
            if (icon) {
                if (icon.classList.contains('fa-chevron-down')) icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
                else if (icon.classList.contains('fa-chevron-up')) icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        }

        function toggleSidebar() {
            const bar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            bar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function saveNote(id, val) {
            journalData[id] = val;
            if (journalSaveTimeout) clearTimeout(journalSaveTimeout);
            journalSaveTimeout = setTimeout(persistJournal, 500);
        }

        function stripHtmlToText(html) {
            if (!html) return '';
            const div = document.createElement('div');
            div.innerHTML = html;
            return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
        }

        function downloadWorkbook(journalOnly) {
            const lines = [];
            lines.push('PRAYER COUNSELING SEMINAR I — FULL INTEGRATED WORKBOOK');
            lines.push('Bukas-Loob sa Diyos');
            lines.push('');
            lines.push('Exported: ' + new Date().toLocaleString());
            lines.push('Device: ' + getDeviceId());
            lines.push('');
            lines.push('══════════════════════════════════════════════════════════');
            SECTIONS.forEach(s => {
                lines.push('');
                lines.push(s.title.toUpperCase());
                lines.push('──────────────────────────────────────────────────────────────');
                if (!journalOnly) {
                    lines.push(stripHtmlToText(s.content));
                    lines.push('');
                }
                lines.push('MY JOURNAL:');
                lines.push(journalData[s.id] || '(No notes for this section)');
                lines.push('');
                lines.push('══════════════════════════════════════════════════════════');
            });
            const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = journalOnly ? 'Prayer_Counseling_Journal_Only.txt' : 'Prayer_Counseling_Full_Workbook.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        window.onload = init;
    </script>
</body>
</html>
